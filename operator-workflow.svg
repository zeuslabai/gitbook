<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="#0a0a14"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold" letter-spacing="2">OPERATOR WORKFLOW</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="monospace" font-size="11">Install → Configure → Deploy → Monitor · Minutes, not hours</text>
  
  <!-- Install -->
  <rect x="40" y="100" width="160" height="100" rx="8" fill="#1a1a2e" stroke="#00ff88" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="14" font-weight="bold">INSTALL</text>
  <text x="120" y="158" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Package manager</text>
  <text x="120" y="173" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">or curl script</text>
  <text x="120" y="190" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">5 minutes</text>
  
  <!-- Arrow -->
  <path d="M205 150 L245 150" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <path d="M240 143 L250 150 L240 157" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Configure -->
  <rect x="255" y="100" width="160" height="100" rx="8" fill="#1a1a2e" stroke="#ffaa00" stroke-width="2"/>
  <text x="335" y="135" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="14" font-weight="bold">CONFIGURE</text>
  <text x="335" y="158" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">API keys</text>
  <text x="335" y="173" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Titan config</text>
  <text x="335" y="190" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">channels + skills</text>
  
  <!-- Arrow -->
  <path d="M420 150 L460 150" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <path d="M455 143 L465 150 L455 157" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Deploy -->
  <rect x="470" y="100" width="160" height="100" rx="8" fill="#1a1a2e" stroke="#ff44cc" stroke-width="2"/>
  <text x="550" y="135" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="14" font-weight="bold">DEPLOY</text>
  <text x="550" y="158" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Connect channels</text>
  <text x="550" y="173" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Load Titans</text>
  <text x="550" y="190" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">zeus daemon start</text>
  
  <!-- Arrow -->
  <path d="M635 150 L675 150" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <path d="M670 143 L680 150 L670 157" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Monitor -->
  <rect x="685" y="100" width="100" height="100" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2" filter="url(#glow9)"/>
  <text x="735" y="135" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="14" font-weight="bold">MONITOR</text>
  <text x="735" y="158" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Health</text>
  <text x="735" y="173" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Logs</text>
  <text x="735" y="190" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Metrics</text>
  
  <!-- TUI screenshot mockup -->
  <rect x="40" y="240" width="360" height="220" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
  <text x="220" y="265" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="11">zeus TUI — example output</text>
  
  <!-- Fake TUI content -->
  <rect x="55" y="275" width="140" height="14" rx="2" fill="rgba(0,212,255,0.2)"/>
  <text x="60" y="286" fill="#00ff88" font-family="monospace" font-size="9">● Zeus daemon  v2.7.1</text>
  
  <rect x="55" y="295" width="330" height="14" rx="2" fill="rgba(0,212,255,0.1)"/>
  <text x="60" y="306" fill="#888" font-family="monospace" font-size="9">CHANNELS  Discord  Telegram  Slack  Email</text>
  
  <rect x="55" y="315" width="330" height="14" rx="2" fill="rgba(0,212,255,0.1)"/>
  <text x="60" y="326" fill="#888" font-family="monospace" font-size="9">TITANS    Zeus100  Zeus112  zeus107  zeusmolty</text>
  
  <rect x="55" y="335" width="330" height="14" rx="2" fill="rgba(0,212,255,0.1)"/>
  <text x="60" y="346" fill="#888" font-family="monospace" font-size="9">MEMORY    12.4K items  |  3 namespaces  |  ● healthy</text>
  
  <rect x="55" y="355" width="330" height="14" rx="2" fill="rgba(0,212,255,0.1)"/>
  <text x="60" y="366" fill="#888" font-family="monospace" font-size="9">SKILLS    38 installed  |  4 active</text>
  
  <rect x="55" y="375" width="330" height="14" rx="2" fill="rgba(0,212,255,0.1)"/>
  <text x="60" y="386" fill="#ffaa00" font-family="monospace" font-size="9">CPU      ██████░░░░  62%  |  RAM  █████░░░░░  51%</text>
  
  <rect x="55" y="395" width="330" height="14" rx="2" fill="rgba(0,212,255,0.1)"/>
  <text x="60" y="406" fill="#00ff88" font-family="monospace" font-size="9">STATUS   All systems operational  |  Uptime: 7d 14h</text>
  
  <rect x="55" y="415" width="330" height="14" rx="2" fill="rgba(0,212,255,0.1)"/>
  <text x="60" y="426" fill="#888" font-family="monospace" font-size="9">zeus > _</text>
  
  <!-- Key commands -->
  <rect x="430" y="240" width="330" height="220" rx="8" fill="#1a1a2e" stroke="#ff44cc" stroke-width="2"/>
  <text x="595" y="265" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="11">KEY COMMANDS</text>
  
  <rect x="445" y="280" width="300" height="24" rx="4" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="455" y="297" fill="#00d4ff" font-family="monospace" font-size="10">zeus init</text>
  
  <rect x="445" y="310" width="300" height="24" rx="4" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="455" y="327" fill="#00d4ff" font-family="monospace" font-size="10">zeus daemon start</text>
  
  <rect x="445" y="340" width="300" height="24" rx="4" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="455" y="357" fill="#00d4ff" font-family="monospace" font-size="10">zeus status</text>
  
  <rect x="445" y="370" width="300" height="24" rx="4" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="455" y="387" fill="#00d4ff" font-family="monospace" font-size="10">zeus logs --follow</text>
  
  <rect x="445" y="400" width="300" height="24" rx="4" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="455" y="417" fill="#00d4ff" font-family="monospace" font-size="10">zeus upgrade</text>
  
  <!-- Footer -->
  <text x="400" y="510" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">Agents should be doing work, not fighting infrastructure</text>
  
  <rect x="180" y="530" width="440" height="40" rx="6" fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="1"/>
  <text x="400" y="550" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="11">Single Mac mini at home · Titan swarm across servers</text>
  <text x="400" y="565" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Same workflow</text>
  
  <!-- Footer bottom -->
  <text x="400" y="590" text-anchor="middle" fill="#444" font-family="monospace" font-size="10">Self-hosted · Zero external dependencies · Yours</text>
</svg>
  <text x="546.5" y="243" text-anchor="middle" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8" font-style="italic">TUI starts · ONLINE</text>

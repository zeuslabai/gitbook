<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ff3c14"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#0a0a0f"/>
  <text x="400" y="30" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="15" font-weight="bold" letter-spacing="2">OPERATOR WORKFLOW</text>
  <text x="400" y="48" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">From zero to production Titan in minutes</text>
  <!-- Step 1: Init -->
  <rect x="30" y="80" width="170" height="90" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="115" y="107" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">1. INIT</text>
  <text x="115" y="128" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus init</text>
  <text x="115" y="143" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Create config</text>
  <text x="115" y="158" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Set API keys</text>
  <!-- Arrow -->
  <line x1="200" y1="125" x2="230" y2="125" stroke="#ff3c14" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 2: Configure -->
  <rect x="240" y="80" width="170" height="90" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="325" y="107" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">2. CONFIGURE</text>
  <text x="325" y="128" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">config.toml</text>
  <text x="325" y="143" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Choose provider</text>
  <text x="325" y="158" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Add channels</text>
  <!-- Arrow -->
  <line x1="410" y1="125" x2="440" y2="125" stroke="#ff3c14" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 3: Run -->
  <rect x="450" y="80" width="170" height="90" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="535" y="107" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">3. RUN</text>
  <text x="535" y="128" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus daemon</text>
  <text x="535" y="143" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">TUI starts</text>
  <text x="535" y="158" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="9">● ONLINE</text>
  <!-- Arrow -->
  <line x1="620" y1="125" x2="650" y2="125" stroke="#ff3c14" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 4: Extend -->
  <rect x="660" y="80" width="120" height="90" rx="8" fill="#1a1a2e" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <text x="720" y="107" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="12" font-weight="bold">4. EXTEND</text>
  <text x="720" y="128" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus skill add</text>
  <text x="720" y="143" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">MCP servers</text>
  <text x="720" y="158" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Custom tools</text>
  <!-- Divider -->
  <line x1="30" y1="195" x2="770" y2="195" stroke="rgba(255,60,20,0.25)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Panel: Channels -->
  <rect x="30" y="210" width="230" height="160" rx="8" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="145" y="235" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">CHANNELS</text>
  <text x="145" y="260" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus channel add discord</text>
  <text x="145" y="278" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus channel add telegram</text>
  <text x="145" y="296" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus channel add slack</text>
  <text x="145" y="314" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus channel add email</text>
  <text x="145" y="342" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Per-channel ACLs</text>
  <text x="145" y="358" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Personality overrides</text>
  <!-- Panel: Skills -->
  <rect x="285" y="210" width="230" height="160" rx="8" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="400" y="235" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">SKILLS</text>
  <text x="400" y="260" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus skill add &lt;name&gt;</text>
  <text x="400" y="278" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">70+ built-in skills</text>
  <text x="400" y="296" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">MCP tool bridging</text>
  <text x="400" y="314" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Custom skill manifests</text>
  <text x="400" y="342" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Hot-reload enabled</text>
  <text x="400" y="358" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Runtime discovery</text>
  <!-- Panel: Titans -->
  <rect x="540" y="210" width="230" height="160" rx="8" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="655" y="235" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">TITANS</text>
  <text x="655" y="260" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus titan list</text>
  <text x="655" y="278" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus titan invoke &lt;name&gt;</text>
  <text x="655" y="296" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Fleet coordination</text>
  <text x="655" y="314" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">A2A protocol</text>
  <text x="655" y="342" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Persistent memory</text>
  <text x="655" y="358" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Specialized domains</text>
  <!-- Bottom bar -->
  <rect x="30" y="400" width="740" height="60" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="1.5"/>
  <text x="400" y="422" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">THE OPERATOR'S TOOLCHAIN</text>
  <text x="400" y="442" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">zeus init · zeus daemon · zeus channel · zeus skill · zeus titan · zeus memory · zeus wallet</text>
  <text x="400" y="458" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Full TUI · Self-hosted · No cloud dependency · Zero vendor lock-in</text>
</svg>
  <text x="429.0" y="187" text-anchor="end" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ffa050" font-weight="700" letter-spacing="2">CONFIGURE</text>

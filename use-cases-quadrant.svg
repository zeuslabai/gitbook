  <text x="220" y="340" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Customer support (8 channels)</text>
  <text x="220" y="357" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Workflow automation</text>
  <text x="220" y="374" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Multi-agent coordination</text>
  <text x="220" y="391" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Reporting & analytics</text>
  <text x="220" y="408" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Slack · Discord · Email · Matrix</text>
  <!-- Q4: Bottom-right — Security/Research -->
  <rect x="415" y="260" width="330" height="160" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="580" y="290" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">SECURITY & RESEARCH</text>
  <text x="580" y="315" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● HIGH FIT</text>
  <text x="580" y="340" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Threat intelligence</text>
  <text x="580" y="357" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Code security scanning</text>
  <text x="580" y="374" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Deep research (Pantheon)</text>
  <text x="580" y="391" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Multi-source synthesis</text>
  <text x="580" y="408" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Aegis · Mnemosyne · A2A</text>

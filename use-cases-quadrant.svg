  <!-- Divider lines -->
  <line x1="400" y1="70" x2="400" y2="420" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <line x1="50" y1="245" x2="750" y2="245" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <!-- Q1: Top-left — Personal Assistant -->
  <rect x="55" y="75" width="330" height="160" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>

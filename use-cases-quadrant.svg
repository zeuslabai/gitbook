  <text x="220" y="155" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Schedule management</text>
  <text x="220" y="172" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Email triage & drafting</text>
  <text x="220" y="189" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Research & summarization</text>
  <text x="220" y="206" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Multi-channel unified inbox</text>
  <text x="220" y="223" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Discord · Telegram · Email</text>
  <!-- Q2: Top-right — Developer Tools -->
  <rect x="415" y="75" width="330" height="160" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="580" y="105" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">DEVELOPER TOOLS</text>
  <text x="580" y="130" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● HIGH FIT</text>
  <text x="580" y="155" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Code review & debugging</text>
  <text x="580" y="172" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">CI/CD automation</text>
  <text x="580" y="189" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Repo management</text>
  <text x="580" y="206" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Documentation generation</text>
  <text x="580" y="223" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Skills: code-exec · git · shell</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#0d1220"/>
    </linearGradient>
    <linearGradient id="qa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="automation" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00a855;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="security" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="multiagent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bf5af2;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#8e24aa;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="880" height="500" fill="url(#bg3)" rx="16"/>

  <text x="440" y="38" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700" font-family="system-ui">USE CASES</text>
  <text x="440" y="56" text-anchor="middle" fill="#7d8590" font-size="9.5" font-family="system-ui">Zeus handles the full lifecycle — from question to action, alone or as a fleet</text>

  <!-- Axis labels -->
  <text x="220" y="78" text-anchor="middle" fill="#00d4ff" font-size="9" font-weight="600" font-family="system-ui">INDIVIDUAL</text>
  <text x="660" y="78" text-anchor="middle" fill="#bf5af2" font-size="9" font-weight="600" font-family="system-ui">FLEET</text>
  <text x="130" y="240" text-anchor="middle" fill="#ffd700" font-size="9" font-weight="600" font-family="system-ui" transform="rotate(-90,130,240)">ONE SHOT</text>
  <text x="750" y="240" text-anchor="middle" fill="#ffd700" font-size="9" font-weight="600" font-family="system-ui" transform="rotate(-90,750,240)">ONGOING</text>

  <!-- Cross axes -->
  <line x1="440" y1="88" x2="440" y2="455" stroke="#1e2a5a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="80" y1="272" x2="800" y2="272" stroke="#1e2a5a" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Q1: Top-left — INDIVIDUAL / ONE SHOT — Q&amp;A -->
  <g transform="translate(80,90)">
    <rect width="340" height="168" rx="12" fill="url(#qa)" stroke="#00d4ff" stroke-width="1.5"/>
    <rect width="340" height="40" rx="12" fill="#00d4ff" fill-opacity="0.12"/>
    <text x="170" y="26" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="700" font-family="system-ui">Questions &amp; Answers</text>
    <text x="170" y="62" text-anchor="middle" fill="#e6edf3" font-size="9.5" font-family="system-ui">Ask anything. Get grounded answers.</text>
    <text x="170" y="84" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Explain this codebase"</text>
    <text x="170" y="102" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Summarize this document"</text>
    <text x="170" y="120" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Debug this error"</text>
    <text x="170" y="150" text-anchor="middle" fill="#00d4ff" font-size="8.5" font-family="system-ui">Mnemosyne + Any Titan</text>
  </g>

  <!-- Q2: Top-right — FLEET / ONE SHOT — Multi-Agent Analysis -->
  <g transform="translate(460,90)">
    <rect width="340" height="168" rx="12" fill="url(#multiagent)" stroke="#bf5af2" stroke-width="1.5"/>
    <rect width="340" height="40" rx="12" fill="#bf5af2" fill-opacity="0.12"/>
    <text x="170" y="26" text-anchor="middle" fill="#bf5af2" font-size="11" font-weight="700" font-family="system-ui">Multi-Agent Analysis</text>
    <text x="170" y="62" text-anchor="middle" fill="#e6edf3" font-size="9.5" font-family="system-ui">Pantheon assembles a research team.</text>
    <text x="170" y="84" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Audit this contract for risks"</text>
    <text x="170" y="102" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Research this competitor"</text>
    <text x="170" y="120" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Simulate this market scenario"</text>
    <text x="170" y="150" text-anchor="middle" fill="#bf5af2" font-size="8.5" font-family="system-ui">Pantheon War Rooms</text>
  </g>

  <!-- Q3: Bottom-left — INDIVIDUAL / ONGOING — Automation -->
  <g transform="translate(80,286)">
    <rect width="340" height="168" rx="12" fill="url(#automation)" stroke="#00ff88" stroke-width="1.5"/>
    <rect width="340" height="40" rx="12" fill="#00ff88" fill-opacity="0.12"/>
    <text x="170" y="26" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="700" font-family="system-ui">Automated Workflows</text>
    <text x="170" y="62" text-anchor="middle" fill="#e6edf3" font-size="9.5" font-family="system-ui">Titan runs your pipeline, 24/7.</text>
    <text x="170" y="84" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Watch this folder, process new files"</text>
    <text x="170" y="102" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Pull my emails, summarize, act"</text>
    <text x="170" y="120" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Rebuild and deploy on git push"</text>
    <text x="170" y="150" text-anchor="middle" fill="#00ff88" font-size="8.5" font-family="system-ui">Skills + Hermes + Mnemosyne</text>
  </g>

  <!-- Q4: Bottom-right — FLEET / ONGOING — Autonomous Operations -->
  <g transform="translate(460,286)">
    <rect width="340" height="168" rx="12" fill="url(#security)" stroke="#ff6b35" stroke-width="1.5"/>
    <rect width="340" height="40" rx="12" fill="#ff6b35" fill-opacity="0.12"/>
    <text x="170" y="26" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="700" font-family="system-ui">Fleet Operations</text>
    <text x="170" y="62" text-anchor="middle" fill="#e6edf3" font-size="9.5" font-family="system-ui">Multi-agent missions, self-coordinating.</text>
    <text x="170" y="84" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Monitor 5 services, alert on anomalies"</text>
    <text x="170" y="102" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Manage my cloud infrastructure"</text>
    <text x="170" y="120" text-anchor="middle" fill="#8892a4" font-size="8" font-family="system-ui">"Run a full incident response"</text>
    <text x="170" y="150" text-anchor="middle" fill="#ff6b35" font-size="8.5" font-family="system-ui">Aegis + Pantheon + All Titans</text>
  </g>

  <!-- Quadrant labels bottom -->
  <text x="250" y="472" text-anchor="middle" fill="#6e7681" font-size="7.5" font-family="system-ui">Q1</text>
  <text x="630" y="472" text-anchor="middle" fill="#6e7681" font-size="7.5" font-family="system-ui">Q2</text>
</svg>

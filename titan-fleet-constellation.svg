<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="520" fill="#0a0a0f"/>
  <text x="400" y="30" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="15" font-weight="bold" letter-spacing="2">TITAN FLEET CONSTELLATION</text>
  <text x="400" y="48" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">5 specialized Titans · A2A coordination · Persistent memory · Fleet intelligence</text>
  <!-- Zeus — Coordinator (center, largest) -->
  <circle cx="400" cy="230" r="55" fill="#1a1a2e" stroke="#ff3c14" stroke-width="3" filter="url(#glow)"/>
  <circle cx="400" cy="230" r="45" fill="#0a0a0f" stroke="#ff3c14" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="400" y="218" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">ZEUS100</text>
  <text x="400" y="233" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Coordinator</text>
  <text x="400" y="248" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="9">● ONLINE</text>
  <!-- Zeus112 — top -->
  <circle cx="400" cy="80" r="40" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="70" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">ZEUS112</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="8">Research</text>
  <text x="400" y="96" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="8">● ONLINE</text>
  <line x1="400" y1="120" x2="400" y2="170" stroke="#ff3c14" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Aegis — bottom left -->
  <circle cx="200" cy="360" r="40" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="200" y="350" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">ZEUS107</text>
  <text x="200" y="364" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="8">Coding</text>
  <text x="200" y="376" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="8">● ONLINE</text>
  <line x1="230" y1="335" x2="320" y2="280" stroke="#ff3c14" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Mnemosyne — bottom center -->
  <circle cx="400" cy="400" r="40" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="390" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">ZEUSMOLTY</text>
  <text x="400" y="404" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="8">Data</text>
  <text x="400" y="416" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="8">● ONLINE</text>
  <line x1="400" y1="360" x2="400" y2="290" stroke="#ff3c14" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- fbsd2 — right -->
  <circle cx="600" cy="360" r="40" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="600" y="350" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">FBSD2</text>
  <text x="600" y="364" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="8">Systems</text>
  <text x="600" y="376" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="8">● ONLINE</text>
  <line x1="570" y1="335" x2="480" y2="280" stroke="#ff3c14" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Your Titan — top right -->
  <circle cx="660" cy="80" r="40" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="660" y="70" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">YOUR TITAN</text>
  <text x="660" y="84" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="8">Custom</text>
  <text x="660" y="96" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="8">○ AVAILABLE</text>
  <line x1="625" y1="100" x2="565" y2="140" stroke="#ff3c14" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Fleet bus -->
  <ellipse cx="400" cy="290" rx="280" ry="60" fill="none" stroke="rgba(255,60,20,0.2)" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="400" y="295" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">A2A fleet bus · shared context</text>
  <!-- Capabilities panel -->
  <rect x="40" y="460" width="720" height="45" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="400" y="480" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">FLEET CAPABILITIES</text>
  <text x="400" y="497" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Persistent memory per Titan · A2A task handoff · pantheon mission new · Fleet-level observability · zeus titan invoke &lt;name&gt;</text>
</svg>
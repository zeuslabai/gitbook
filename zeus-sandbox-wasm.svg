<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="glow10">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="#0a0a14"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold" letter-spacing="2">ZEUS SANDBOX — WASM ISOLATION</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="monospace" font-size="11">WebAssembly runtime · Millisecond execution · Formal isolation guarantees</text>
  
  <!-- Zeus Core - outer boundary -->
  <rect x="40" y="90" width="720" height="400" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="115" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="12" opacity="0.7">ZEUS CORE PROCESS</text>
  
  <!-- WASM Sandbox boundary -->
  <rect x="100" y="140" width="600" height="300" rx="10" fill="rgba(0,212,255,0.03)" stroke="#00ff88" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11" font-weight="bold">zeus-sandbox — WASM RUNTIME</text>
  <text x="400" y="182" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">Capability-based security · Fine-grained access control</text>
  
  <!-- Skill 1 - Rust -->
  <rect x="130" y="210" width="160" height="90" rx="8" fill="#1a1a2e" stroke="#ff44cc" stroke-width="2"/>
  <text x="210" y="240" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="13" font-weight="bold">Skill A (Rust)</text>
  <text x="210" y="260" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Compiled to WASM</text>
  <text x="210" y="280" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Sandboxed execution</text>
  <text x="210" y="295" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9">● Isolated</text>
  
  <!-- Skill 2 - Python (via Pyodide) -->
  <rect x="320" y="210" width="160" height="90" rx="8" fill="#1a1a2e" stroke="#ffaa00" stroke-width="2"/>
  <text x="400" y="240" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="13" font-weight="bold">Skill B (Python)</text>
  <text x="400" y="260" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Pyodide WASM build</text>
  <text x="400" y="280" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Sandboxed execution</text>
  <text x="400" y="295" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9">● Isolated</text>
  
  <!-- Skill 3 - Go -->
  <rect x="510" y="210" width="160" height="90" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
  <text x="590" y="240" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="13" font-weight="bold">Skill C (Go)</text>
  <text x="590" y="260" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">TinyGo → WASM</text>
  <text x="590" y="280" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Sandboxed execution</text>
  <text x="590" y="295" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="9">● Isolated</text>
  
  <!-- Capability grants -->
  <text x="400" y="340" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">CAPABILITY GRANTS (WASI-style)</text>
  
  <!-- File system access -->
  <rect x="130" y="355" width="160" height="30" rx="4" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1"/>
  <text x="210" y="375" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="10">FS: ./data/  (granted)</text>
  
  <rect x="320" y="355" width="160" height="30" rx="4" fill="rgba(255,68,204,0.08)" stroke="#ff44cc" stroke-width="1"/>
  <text x="400" y="375" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="10">FS: DENIED</text>
  
  <rect x="510" y="355" width="160" height="30" rx="4" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1"/>
  <text x="590" y="375" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="10">FS: ./logs/  (granted)</text>
  
  <!-- Network access -->
  <rect x="130" y="395" width="160" height="30" rx="4" fill="rgba(255,68,204,0.08)" stroke="#ff44cc" stroke-width="1"/>
  <text x="210" y="415" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="10">NET: DENIED</text>
  
  <rect x="320" y="395" width="160" height="30" rx="4" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1"/>
  <text x="400" y="415" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="10">NET: api.stripe.com</text>
  
  <rect x="510" y="395" width="160" height="30" rx="4" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1"/>
  <text x="590" y="415" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="10">NET: DENIED</text>
  
  <!-- Comparison: containers vs sandbox -->
  <text x="400" y="510" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">VS TRADITIONAL ISOLATION</text>
  
  <rect x="60" y="520" width="320" height="50" rx="6" fill="#1a1a2e" stroke="#ff44cc" stroke-width="1.5"/>
  <text x="220" y="545" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="11">Docker Container</text>
  <text x="220" y="562" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Cold start: seconds · Overhead: high</text>
  
  <rect x="420" y="520" width="320" height="50" rx="6" fill="#1a1a2e" stroke="#00ff88" stroke-width="1.5"/>
  <text x="580" y="545" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11">zeus-sandbox WASM</text>
  <text x="580" y="562" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Cold start: milliseconds · Overhead: near-zero</text>
  
  <!-- Footer -->
  <text x="400" y="590" text-anchor="middle" fill="#444" font-family="monospace" font-size="10">Millisecond skill execution · Formal isolation · WASI-style capability model</text>
</svg>
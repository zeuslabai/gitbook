<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ff3c14"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#0a0a0f"/>
  <text x="400" y="30" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="15" font-weight="bold" letter-spacing="2">ZEUS SANDBOX + WASM</text>
  <text x="400" y="48" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Isolated code execution · WASM plugin runtime · Zero systemic risk</text>
  <!-- Sandbox boundary -->
  <rect x="120" y="75" width="560" height="320" rx="12" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" stroke-dasharray="8,5" filter="url(#glow)"/>
  <text x="400" y="100" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">SANDBOXED EXECUTION ENVIRONMENT</text>
  <text x="400" y="116" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">WASM runtime · Memory isolated · No filesystem access · Network blocked</text>
  <!-- Code input -->
  <rect x="160" y="135" width="200" height="90" rx="8" fill="#0a0a0f" stroke="#ff3c14" stroke-width="1.5"/>
  <text x="260" y="158" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">CODE INPUT</text>
  <text x="260" y="178" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Python · JavaScript</text>
  <text x="260" y="194" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Rust compiled to WASM</text>
  <text x="260" y="215" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">zeus exec --sandbox</text>
  <!-- Arrow -->
  <line x1="360" y1="180" x2="400" y2="180" stroke="#ff3c14" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- WASM Runtime -->
  <rect x="400" y="135" width="250" height="90" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="525" y="158" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">WASM PLUGIN RUNTIME</text>
  <text x="525" y="178" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Wasmtime · WASMER · WasmEdge</text>
  <text x="525" y="195" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Sandboxed by design · Capability-based</text>
  <text x="525" y="212" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">security model</text>
  <!-- Output -->
  <rect x="250" y="250" width="300" height="60" rx="8" fill="#0a0a0f" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="bold">OUTPUT / RESULT</text>
  <text x="400" y="295" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">stdout · return value · structured JSON</text>
  <!-- Arrow down to result -->
  <line x1="400" y1="310" x2="400" y2="350" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Features row -->
  <rect x="160" y="360" width="150" height="70" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="235" y="385" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="10" font-weight="bold">MEMORY ISOLATION</text>
  <text x="235" y="403" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">No cross-request state</text>
  <text x="235" y="418" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">leakage possible</text>
  <rect x="325" y="360" width="150" height="70" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="400" y="385" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="10" font-weight="bold">NETWORK BLOCKED</text>
  <text x="400" y="403" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">No outbound connections</text>
  <text x="400" y="418" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">from sandboxed code</text>
  <rect x="490" y="360" width="150" height="70" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="565" y="385" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="10" font-weight="bold">TIMEOUT ENFORCED</text>
  <text x="565" y="403" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Max execution time</text>
  <text x="565" y="418" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">enforced at runtime</text>
  <!-- Bottom note -->
  <rect x="40" y="450" width="720" height="40" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="400" y="472" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Skills run inside sandbox · zeus exec --sandbox &lt;code&gt; · WASM plugins via zeus plugin install</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a1f3a"/>
    </linearGradient>
    <linearGradient id="zeus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    <linearGradient id="titan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="16"/>
  <!-- Grid lines -->
  <g stroke="#1e2a5a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="130" x2="900" y2="130"/><line x1="0" y1="260" x2="900" y2="260"/>
    <line x1="0" y1="390" x2="900" y2="390"/>
    <line x1="225" y1="0" x2="225" y2="520"/><line x1="450" y1="0" x2="450" y2="520"/>
    <line x1="675" y1="0" x2="675" y2="520"/>
  </g>
  
  <!-- Center: ZEUS -->
  <g filter="url(#glow)">
    <circle cx="450" cy="260" r="58" fill="url(#zeus-grad)" opacity="0.15"/>
    <circle cx="450" cy="260" r="46" fill="#0d1117" stroke="url(#zeus-grad)" stroke-width="2.5"/>
    <text x="450" y="253" text-anchor="middle" fill="#ffd700" font-size="11" font-weight="700" font-family="system-ui">⚡ ZEUS</text>
    <text x="450" y="268" text-anchor="middle" fill="#ffd700" font-size="7" font-family="system-ui" opacity="0.7">FLEET COORDINATOR</text>
  </g>
  
  <!-- Connection lines from Zeus to each Titan -->
  <g stroke="#00d4ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="6,4">
    <!-- Aegis (top-left) -->
    <line x1="405" y1="222" x2="200" y2="110"/>
    <!-- Mnemosyne (top-right) -->
    <line x1="495" y1="222" x2="700" y2="110"/>
    <!-- Pantheon (bottom-left) -->
    <line x1="405" y1="298" x2="200" y2="410"/>
    <!-- Hermes (bottom-right) -->
    <line x1="495" y1="298" x2="700" y2="410"/>
    <!-- Operator (bottom-center) -->
    <line x1="450" y1="314" x2="450" y2="455"/>
  </g>
  
  <!-- Aegis — Security (top-left) -->
  <g filter="url(#soft-glow)">
    <circle cx="160" cy="90" r="38" fill="#0d1117" stroke="#00ff88" stroke-width="2"/>
    <text x="160" y="86" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="700" font-family="system-ui">🛡️ AEGIS</text>
    <text x="160" y="99" text-anchor="middle" fill="#00ff88" font-size="6.5" font-family="system-ui" opacity="0.7">SECURITY</text>
  </g>
  <text x="160" y="62" text-anchor="middle" fill="#8892a4" font-size="7" font-family="system-ui">Zero-Trust Auth</text>
  
  <!-- Mnemosyne — Memory (top-right) -->
  <g filter="url(#soft-glow)">
    <circle cx="740" cy="90" r="38" fill="#0d1117" stroke="#bf5af2" stroke-width="2"/>
    <text x="740" y="86" text-anchor="middle" fill="#bf5af2" font-size="10" font-weight="700" font-family="system-ui">🧠 MNEMO</text>
    <text x="740" y="99" text-anchor="middle" fill="#bf5af2" font-size="6.5" font-family="system-ui" opacity="0.7">MEMORY</text>
  </g>
  <text x="740" y="62" text-anchor="middle" fill="#8892a4" font-size="7" font-family="system-ui">Persistent Context</text>
  
  <!-- Pantheon — Orchestration (bottom-left) -->
  <g filter="url(#soft-glow)">
    <circle cx="160" cy="430" r="38" fill="#0d1117" stroke="#ff6b35" stroke-width="2"/>
    <text x="160" y="426" text-anchor="middle" fill="#ff6b35" font-size="10" font-weight="700" font-family="system-ui">⚙️ PANTHEON</text>
    <text x="160" y="439" text-anchor="middle" fill="#ff6b35" font-size="6.5" font-family="system-ui" opacity="0.7">ORCHESTRATION</text>
  </g>
  <text x="160" y="485" text-anchor="middle" fill="#8892a4" font-size="7" font-family="system-ui">Multi-Agent War Rooms</text>
  
  <!-- Hermes — Comms (bottom-right) -->
  <g filter="url(#soft-glow)">
    <circle cx="740" cy="430" r="38" fill="#0d1117" stroke="#00d4ff" stroke-width="2"/>
    <text x="740" y="426" text-anchor="middle" fill="#00d4ff" font-size="10" font-weight="700" font-family="system-ui">📡 HERMES</text>
    <text x="740" y="439" text-anchor="middle" fill="#00d4ff" font-size="6.5" font-family="system-ui" opacity="0.7">COMMUNICATION</text>
  </g>
  <text x="740" y="485" text-anchor="middle" fill="#8892a4" font-size="7" font-family="system-ui">8 Channels</text>
  
  <!-- Operator (bottom-center) -->
  <g filter="url(#soft-glow)">
    <circle cx="450" cy="470" r="32" fill="#0d1117" stroke="#8892a4" stroke-width="2"/>
    <text x="450" y="466" text-anchor="middle" fill="#c9d1d9" font-size="9" font-weight="700" font-family="system-ui">👤 OPERATOR</text>
    <text x="450" y="479" text-anchor="middle" fill="#8892a4" font-size="6.5" font-family="system-ui">YOU</text>
  </g>
  
  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700" font-family="system-ui">ZEUS FLEET ARCHITECTURE</text>
  <text x="450" y="48" text-anchor="middle" fill="#7d8590" font-size="9" font-family="system-ui">Event-driven coordination across specialized Titan agents</text>
  
  <!-- Legend -->
  <g transform="translate(20, 490)">
    <rect width="8" height="8" fill="#ffd700" rx="2"/>
    <text x="14" y="8" fill="#7d8590" font-size="7" font-family="system-ui">Coordinator</text>
    <rect x="70" width="8" height="8" fill="#00d4ff" rx="2"/>
    <text x="84" y="8" fill="#7d8590" font-size="7" font-family="system-ui">Titan</text>
    <line x1="130" y1="4" x2="148" y2="4" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="154" y="8" fill="#7d8590" font-size="7" font-family="system-ui">Dispatch</text>
  </g>
</svg>

  <path d="M 444 307 L 444 301 A 6 6 0 0 1 456 301 L 456 307" fill="none" stroke="#ff6842" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#f5f0eb" font-weight="700" letter-spacing="2">YOUR DATA</text>

  <line x1="308.5786437626905" y1="451.4213562373095" x2="273.22330470336317" y2="486.7766952966369" stroke="#6b1018" stroke-width="0.75" opacity="0.6"/>
  <circle cx="273.22330470336317" cy="486.7766952966369" r="3" fill="#6b1018"/>

  <text x="261.22330470336317" y="480.7766952966369" text-anchor="end" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#6b1018" font-weight="700" letter-spacing="2">L1 · OS SANDBOX</text>
  <text x="261.22330470336317" y="496.7766952966369" text-anchor="end" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#8a8278">Seatbelt · macOS</text>

  <line x1="563.1370849898476" y1="423.1370849898476" x2="626.776695296637" y2="486.77669529663683" stroke="#8a2018" stroke-width="0.75" opacity="0.6"/>
  <circle cx="626.776695296637" cy="486.77669529663683" r="3" fill="#8a2018"/>

  <text x="638.776695296637" y="480.77669529663683" text-anchor="start" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#8a2018" font-weight="700" letter-spacing="2">L2 · CMD FILTER</text>
  <text x="638.776695296637" y="496.77669529663683" text-anchor="start" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#8a8278">Allowlists · approval gates</text>

  <line x1="534.8528137423857" y1="225.1471862576143" x2="626.7766952966368" y2="133.22330470336308" stroke="#b03018" stroke-width="0.75" opacity="0.6"/>
  <circle cx="626.7766952966368" cy="133.22330470336308" r="3" fill="#b03018"/>

  <text x="638.7766952966368" y="127.22330470336308" text-anchor="start" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#b03018" font-weight="700" letter-spacing="2">L3 · AUDIT TRAIL</text>
  <text x="638.7766952966368" y="143.22330470336308" text-anchor="start" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#8a8278">JSONL · 0600 perms</text>

  <line x1="393.4314575050762" y1="253.4314575050762" x2="273.22330470336306" y2="133.22330470336314" stroke="#ff3c14" stroke-width="0.75" opacity="0.6"/>
  <circle cx="273.22330470336306" cy="133.22330470336314" r="3" fill="#ff3c14"/>

  <text x="261.22330470336306" y="127.22330470336314" text-anchor="end" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff3c14" font-weight="700" letter-spacing="2">L4 · WASM SANDBOX</text>
  <text x="261.22330470336306" y="143.22330470336314" text-anchor="end" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#8a8278">Capability isolation</text>
<text x="225.0" y="535" text-anchor="middle" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#22c55e" font-weight="700" letter-spacing="2">● 0600 PERMS</text><text x="375.0" y="535" text-anchor="middle" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#ff3c14" font-weight="700" letter-spacing="2">● ZERO TRUST</text><text x="525.0" y="535" text-anchor="middle" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#ffa050" font-weight="700" letter-spacing="2">● APPROVAL GATES</text><text x="675.0" y="535" text-anchor="middle" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#06b6d4" font-weight="700" letter-spacing="2">● SEATBELT</text>
  <text x="450.0" y="555" text-anchor="middle" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#5a5650" font-style="italic">Identity · Channels · Execution · Audit · No independent state</text>
</svg>
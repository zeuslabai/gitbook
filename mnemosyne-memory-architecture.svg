<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ff3c14"/>
    </marker>
    <marker id="arrowGreen" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="800" height="550" fill="#0a0a0f"/>
  <text x="400" y="32" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="15" font-weight="bold" letter-spacing="2">MNEMOSYNE MEMORY ARCHITECTURE</text>
  <text x="400" y="50" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Persistent vector + FTS hybrid · Self-hosted · Zero vendor lock-in</text>
  <!-- Input node -->
  <rect x="300" y="70" width="200" height="50" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="93" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">COGNITIVE ENGINE</text>
  <text x="400" y="108" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Every message → Mnemosyne</text>
  <!-- Arrow down to store -->
  <line x1="400" y1="120" x2="400" y2="165" stroke="#ff3c14" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Memory Store (center) -->
  <rect x="260" y="175" width="280" height="60" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="198" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">MNEMOSYNE STORE</text>
  <text x="400" y="216" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">SQLite-backed · Self-hosted · Encrypted at rest</text>
  <!-- Split arrows -->
  <line x1="340" y1="235" x2="180" y2="290" stroke="#ff3c14" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="235" x2="400" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="460" y1="235" x2="620" y2="290" stroke="#ff3c14" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Vector index -->
  <rect x="60" y="300" width="200" height="90" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2"/>
  <text x="160" y="323" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">VECTOR INDEX</text>
  <text x="160" y="343" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Embeddings (1536-dim)</text>
  <text x="160" y="358" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Semantic similarity</text>
  <text x="160" y="373" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">ANN retrieval · top-k</text>
  <!-- Full-text search -->
  <rect x="300" y="300" width="200" height="90" rx="8" fill="#1a1a2e" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="323" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="12" font-weight="bold">FULL-TEXT SEARCH</text>
  <text x="400" y="343" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">SQLite FTS5</text>
  <text x="400" y="358" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Keyword + phrase</text>
  <text x="400" y="373" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Sub-10ms queries</text>
  <!-- Session store -->
  <rect x="540" y="300" width="200" height="90" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2"/>
  <text x="640" y="323" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">SESSION STORE</text>
  <text x="640" y="343" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Message history</text>
  <text x="640" y="358" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Token tracking</text>
  <text x="640" y="373" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Per-channel sessions</text>
  <!-- Merge back -->
  <line x1="160" y1="390" x2="160" y2="430" stroke="#ff3c14" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="400" y1="390" x2="400" y2="430" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="640" y1="390" x2="640" y2="430" stroke="#ff3c14" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Context injection -->
  <rect x="250" y="440" width="300" height="60" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="463" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">CONTEXT INJECTION</text>
  <text x="400" y="480" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Hybrid retrieval: semantic + keyword · reranked · streamed to LLM</text>
  <!-- Footer -->
  <text x="400" y="530" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">All memory local · zeus memory search · zeus memory stats · No cloud dependency</text>
</svg>
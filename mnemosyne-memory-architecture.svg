<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="b1"/>
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-inner" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Background gradient -->
    <radialGradient id="bg-rad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#12100e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#050403" stop-opacity="1"/>
    </radialGradient>

    <!-- Scan lines pattern -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ff3c14" stroke-width="0.4" opacity="0.04"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff3c14" stroke-width="0.5" opacity="0.05"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#ff3c14"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#ffa050"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#06b6d4"/>
    </marker>

    <!-- Focal core gradient -->
    <radialGradient id="core-rad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6842" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ff3c14" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff3c14" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow orb gradients per accent -->
    <radialGradient id="orb-crimson" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3c14" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff3c14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffa050" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffa050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background layers -->
  <rect width="900" height="580" fill="#050403"/>
  <rect width="900" height="580" fill="url(#bg-rad)"/>
  <rect width="900" height="580" fill="url(#grid)"/>
  <rect width="900" height="580" fill="url(#scanlines)"/>

  <!-- Corner brackets -->
  <g stroke="#a0301a" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M 14 14 L 14 36 M 14 14 L 36 14"/>
    <path d="M 886 14 L 886 36 M 886 14 L 864 14"/>
    <path d="M 14 566 L 14 544 M 14 566 L 36 566"/>
    <path d="M 886 566 L 886 544 M 886 566 L 864 566"/>
  </g>

  <!-- Top header bar -->
  <line x1="40" y1="46" x2="100" y2="46" stroke="#ff3c14" stroke-width="1.5"/>
  <text x="40" y="40" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff3c14" font-weight="700" letter-spacing="4">ZEUS</text>
  <text x="120" y="40" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#8a8278" letter-spacing="3">05 · MEMORY</text>
  <text x="860" y="40" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#5a5650" text-anchor="end" letter-spacing="2">NOVAXAI · 2026</text>

  <!-- Title -->
  <text x="40" y="80" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="24" fill="#f5f0eb" font-weight="700" letter-spacing="2">Mnemosyne · Three-Layer Memory</text>
  <text x="40" y="102" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#8a8278" font-style="italic" letter-spacing="0.5">Memory that compounds, not memory that resets</text>

  <ellipse cx="450.0" cy="180" rx="380" ry="40" fill="url(#orb-crimson)" opacity="0.25"/>
  <rect x="100" y="148" width="700" height="80" fill="#12100e" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="100" y="148" width="700" height="3" fill="#06b6d4"/>

  <!-- Code badge -->
  <rect x="115" y="160" width="58" height="58" fill="#06b6d4"/>
  <text x="144" y="188" text-anchor="middle" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="22" fill="#050403" font-weight="700">L1</text>

  <!-- Label block -->
  <text x="195" y="170" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#06b6d4" font-weight="700" letter-spacing="3">WORKSPACE MEMORY</text>
  <text x="195" y="192" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="15" fill="#f5f0eb" font-weight="700" letter-spacing="0.5">File-based · Human-readable</text>
  <text x="195" y="210" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8" font-style="italic">AGENTS.md · SOUL.md · journals/</text>

  <!-- Right side stats -->
  <text x="785" y="170" text-anchor="end" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#5a5650" letter-spacing="2">LAYER 1/3</text>

  <path d="M 450.0 230 L 450.0 255" stroke="#a0301a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <polygon points="445.0,250 455.0,250 450.0,258" fill="#a0301a" opacity="0.6"/>
<ellipse cx="450.0" cy="290" rx="380" ry="40" fill="url(#orb-crimson)" opacity="0.25"/>
  <rect x="100" y="258" width="700" height="80" fill="#12100e" stroke="#ff3c14" stroke-width="1.5"/>
  <rect x="100" y="258" width="700" height="3" fill="#ff3c14"/>

  <!-- Code badge -->
  <rect x="115" y="270" width="58" height="58" fill="#ff3c14"/>
  <text x="144" y="298" text-anchor="middle" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="22" fill="#050403" font-weight="700">L2</text>

  <!-- Label block -->
  <text x="195" y="280" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#ff3c14" font-weight="700" letter-spacing="3">MNEMOSYNE · SEMANTIC</text>
  <text x="195" y="302" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="15" fill="#f5f0eb" font-weight="700" letter-spacing="0.5">SQLite FTS5 + Vector embeddings</text>
  <text x="195" y="320" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8" font-style="italic">Hybrid BM25/cosine · 12,847 facts</text>

  <!-- Right side stats -->
  <text x="785" y="280" text-anchor="end" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#5a5650" letter-spacing="2">LAYER 2/3</text>

  <path d="M 450.0 340 L 450.0 365" stroke="#a0301a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <polygon points="445.0,360 455.0,360 450.0,368" fill="#a0301a" opacity="0.6"/>
<ellipse cx="450.0" cy="400" rx="380" ry="40" fill="url(#orb-crimson)" opacity="0.25"/>
  <rect x="100" y="368" width="700" height="80" fill="#12100e" stroke="#ffa050" stroke-width="1.5"/>
  <rect x="100" y="368" width="700" height="3" fill="#ffa050"/>

  <!-- Code badge -->
  <rect x="115" y="380" width="58" height="58" fill="#ffa050"/>
  <text x="144" y="408" text-anchor="middle" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="22" fill="#050403" font-weight="700">L3</text>

  <!-- Label block -->
  <text x="195" y="390" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#ffa050" font-weight="700" letter-spacing="3">EVENT LEDGER</text>
  <text x="195" y="412" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="15" fill="#f5f0eb" font-weight="700" letter-spacing="0.5">Append-only JSONL</text>
  <text x="195" y="430" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8" font-style="italic">Every wake · run · skip · error</text>

  <!-- Right side stats -->
  <text x="785" y="390" text-anchor="end" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#5a5650" letter-spacing="2">LAYER 3/3</text>

  <rect x="100" y="475" width="700" height="50" fill="#1a1410" stroke="#a0301a" stroke-width="0.75" stroke-dasharray="3,3"/>
  <text x="120" y="497" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff3c14" font-weight="700" letter-spacing="3">QUERY PATH</text>
  <text x="120" y="514" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#d4cfc8">recall("…")  →  L1 grep  →  L2 hybrid  →  L3 timeline filter  →  ranked context</text>

</svg>
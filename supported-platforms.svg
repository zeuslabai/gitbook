<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#0a0a0f"/>
  <text x="400" y="32" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="15" font-weight="bold" letter-spacing="2">SUPPORTED PLATFORMS</text>
  <text x="400" y="50" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="11">Zeus runs anywhere Rust runs · 2GB RAM minimum</text>
  <!-- macOS -->
  <rect x="50" y="75" width="210" height="70" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="155" y="103" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">macOS</text>
  <text x="155" y="122" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Intel + Apple Silicon</text>
  <rect x="95" y="132" width="120" height="5" rx="2" fill="rgba(255,60,20,0.3)"/>
  <text x="155" y="145" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● FULL SUPPORT</text>
  <!-- Linux -->
  <rect x="295" y="75" width="210" height="70" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="103" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">Linux</text>
  <text x="400" y="122" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">x86_64 · ARM · RISC-V</text>
  <rect x="340" y="132" width="120" height="5" rx="2" fill="rgba(255,60,20,0.3)"/>
  <text x="400" y="145" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● FULL SUPPORT</text>
  <!-- FreeBSD -->
  <rect x="540" y="75" width="210" height="70" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="645" y="103" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">FreeBSD</text>
  <text x="645" y="122" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">x86_64 · ARM64</text>
  <rect x="585" y="132" width="120" height="5" rx="2" fill="rgba(255,60,20,0.3)"/>
  <text x="645" y="145" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● FULL SUPPORT</text>
  <!-- WSL -->
  <rect x="50" y="170" width="210" height="70" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="155" y="198" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">Windows (WSL2)</text>
  <text x="155" y="217" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Recommended on Windows</text>
  <rect x="95" y="227" width="120" height="5" rx="2" fill="rgba(255,60,20,0.3)"/>
  <text x="155" y="240" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● FULL SUPPORT</text>
  <!-- Docker -->
  <rect x="295" y="170" width="210" height="70" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="198" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">Docker</text>
  <text x="400" y="217" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Official images on GHCR</text>
  <rect x="340" y="227" width="120" height="5" rx="2" fill="rgba(255,60,20,0.3)"/>
  <text x="400" y="240" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● FULL SUPPORT</text>
  <!-- Homebrew -->
  <rect x="540" y="170" width="210" height="70" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="645" y="198" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">Homebrew</text>
  <text x="645" y="217" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">macOS/Linux one-liner</text>
  <rect x="585" y="227" width="120" height="5" rx="2" fill="rgba(255,60,20,0.3)"/>
  <text x="645" y="240" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● FULL SUPPORT</text>
  <!-- RISC-V -->
  <rect x="50" y="265" width="210" height="70" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="155" y="293" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">RISC-V</text>
  <text x="155" y="312" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Embedded / Edge部署</text>
  <rect x="95" y="322" width="120" height="5" rx="2" fill="rgba(255,60,20,0.3)"/>
  <text x="155" y="335" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● FULL SUPPORT</text>
  <!-- Raspberry Pi -->
  <rect x="295" y="265" width="210" height="70" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="293" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">Raspberry Pi</text>
  <text x="400" y="312" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">ARM SBC · OrangePi</text>
  <rect x="340" y="322" width="120" height="5" rx="2" fill="rgba(255,60,20,0.3)"/>
  <text x="400" y="335" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● FULL SUPPORT</text>
  <!-- cargo install -->
  <rect x="540" y="265" width="210" height="70" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="645" y="293" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">cargo install</text>
  <text x="645" y="312" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">Universal binary builder</text>
  <rect x="585" y="322" width="120" height="5" rx="2" fill="rgba(255,60,20,0.3)"/>
  <text x="645" y="335" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● FULL SUPPORT</text>
  <!-- Minimum requirements -->
  <rect x="50" y="370" width="340" height="70" rx="8" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="220" y="398" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">MINIMUM REQUIREMENTS</text>
  <text x="220" y="418" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="11">2GB RAM · 1GB disk</text>
  <text x="220" y="436" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Sufficient for daemon + CLI mode</text>
  <!-- Recommended -->
  <rect x="410" y="370" width="340" height="70" rx="8" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="580" y="398" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">RECOMMENDED</text>
  <text x="580" y="418" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="11">4GB+ RAM for full TUI/desktop</text>
  <text x="580" y="436" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">GPU acceleration via CUDA/Metal when available</text>
  <!-- Quick install -->
  <rect x="50" y="465" width="700" height="50" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="490" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">QUICK INSTALL</text>
  <text x="400" y="507" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">curl -fsSL https://raw.githubusercontent.com/zeuslabai/Zeus/main/install.sh | bash</text>
  <text x="400" y="565" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Zero external dependencies · Self-hosted · Yours · No Zeus cloud account required</text>
</svg>
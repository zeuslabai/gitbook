<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="glow11">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="#0a0a14"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold" letter-spacing="2">ZEUS API ARCHITECTURE</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="monospace" font-size="11">REST + WebSocket · Full capability access · Build integrations</text>
  
  <!-- Base URL -->
  <rect x="220" y="75" width="360" height="40" rx="6" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="13">http://localhost:8080/api/v1</text>
  
  <!-- REST endpoints cluster -->
  <rect x="40" y="140" width="340" height="320" rx="10" fill="#1a1a2e" stroke="#ff44cc" stroke-width="2"/>
  <text x="210" y="170" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="14" font-weight="bold">REST API</text>
  <text x="210" y="188" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Synchronous · Stateless · JSON</text>
  
  <!-- Sessions -->
  <rect x="60" y="205" width="300" height="50" rx="6" fill="rgba(255,68,204,0.08)" stroke="#ff44cc" stroke-width="1.5"/>
  <text x="210" y="228" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="11">/sessions</text>
  <text x="210" y="245" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">POST GET DELETE</text>
  
  <!-- Channels -->
  <rect x="60" y="265" width="300" height="50" rx="6" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1.5"/>
  <text x="210" y="288" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11">/channels</text>
  <text x="210" y="305" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">GET list · POST configure</text>
  
  <!-- Titans -->
  <rect x="60" y="325" width="300" height="50" rx="6" fill="rgba(255,170,0,0.08)" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="210" y="348" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="11">/titans</text>
  <text x="210" y="365" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">GET list · POST spawn · DELETE</text>
  
  <!-- Memory -->
  <rect x="60" y="385" width="300" height="50" rx="6" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="210" y="408" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="11">/memory</text>
  <text x="210" y="425" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">GET POST DELETE · namespaces</text>
  
  <!-- Skills -->
  <rect x="60" y="445" width="140" height="40" rx="4" fill="rgba(255,68,204,0.05)" stroke="#ff44cc" stroke-width="1"/>
  <text x="130" y="468" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="10">/skills</text>
  
  <!-- Wallet -->
  <rect x="220" y="445" width="140" height="40" rx="4" fill="rgba(255,170,0,0.05)" stroke="#ffaa00" stroke-width="1"/>
  <text x="290" y="468" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="10">/wallet</text>
  
  <!-- WebSocket cluster -->
  <rect x="420" y="140" width="340" height="320" rx="10" fill="#1a1a2e" stroke="#00ff88" stroke-width="2"/>
  <text x="590" y="170" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="14" font-weight="bold">WebSocket API</text>
  <text x="590" y="188" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Real-time · Bidirectional · Streaming</text>
  
  <!-- WS connection -->
  <rect x="445" y="205" width="290" height="40" rx="6" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="1.5"/>
  <text x="590" y="230" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11">ws://localhost:8080/ws</text>
  
  <!-- Streaming responses -->
  <rect x="445" y="260" width="290" height="50" rx="6" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1"/>
  <text x="590" y="285" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11">Streaming Responses</text>
  <text x="590" y="302" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">Server-sent events · Token-by-token</text>
  
  <!-- Real-time events -->
  <rect x="445" y="325" width="290" height="50" rx="6" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1"/>
  <text x="590" y="350" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11">Real-time Events</text>
  <text x="590" y="367" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">message.created · titan.thinking · tool.call</text>
  
  <!-- Interactive sessions -->
  <rect x="445" y="390" width="290" height="50" rx="6" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="1"/>
  <text x="590" y="415" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11">Interactive Sessions</text>
  <text x="590" y="432" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">Multi-turn conversations</text>
  
  <!-- SDKs -->
  <rect x="420" y="470" width="340" height="50" rx="6" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="590" y="495" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="11">Official SDKs</text>
  <text x="590" y="512" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Python · JavaScript/TypeScript · Rust</text>
  
  <!-- Auth note -->
  <rect x="40" y="480" width="340" height="40" rx="6" fill="rgba(255,68,204,0.08)" stroke="#ff44cc" stroke-width="1"/>
  <text x="210" y="505" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="11">Authorization: Bearer TOKEN</text>
  <text x="210" y="515" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">Session token required for all requests</text>
  
  <!-- Footer -->
  <text x="400" y="580" text-anchor="middle" fill="#444" font-family="monospace" font-size="10">Build integrations · Automate workflows · Embed Zeus in your applications</text>
</svg>
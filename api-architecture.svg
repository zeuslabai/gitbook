<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#0a0a0f"/>
  <text x="400" y="35" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="16" font-weight="bold" letter-spacing="2">API ARCHITECTURE</text>
  <text x="400" y="55" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="11">REST + WebSocket · Full platform access</text>
  <!-- External Client -->
  <rect x="300" y="80" width="200" height="50" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="102" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">EXTERNAL CLIENT</text>
  <text x="400" y="117" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">SDK · curl · WebSocket</text>
  <!-- Arrows down -->
  <line x1="370" y1="130" x2="370" y2="170" stroke="#ff3c14" stroke-width="2"/>
  <polygon points="370,175 365,165 375,165" fill="#ff3c14"/>
  <line x1="430" y1="130" x2="430" y2="170" stroke="#ff3c14" stroke-width="2"/>
  <polygon points="430,175 425,165 435,165" fill="#ff3c14"/>
  <text x="400" y="157" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">REST / WS</text>
  <!-- API Gateway -->
  <rect x="250" y="180" width="300" height="60" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">API GATEWAY :8080</text>
  <text x="400" y="223" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Auth · Rate Limit · Route</text>
  <!-- Arrows to services -->
  <line x1="300" y1="240" x2="200" y2="300" stroke="#ff3c14" stroke-width="2"/>
  <polygon points="195,298 205,298 200,308" fill="#ff3c14"/>
  <line x1="400" y1="240" x2="400" y2="300" stroke="#ff3c14" stroke-width="2"/>
  <polygon points="400,305 395,295 405,295" fill="#ff3c14"/>
  <line x1="500" y1="240" x2="600" y2="300" stroke="#ff3c14" stroke-width="2"/>
  <polygon points="605,298 595,298 600,308" fill="#ff3c14"/>
  <!-- Core Engine -->
  <rect x="280" y="300" width="240" height="50" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="322" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="13" font-weight="bold">ZEUS CORE ENGINE</text>
  <text x="400" y="340" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Cognitive Loop · Tool Orchestration</text>
  <!-- Lower tier -->
  <rect x="70" y="380" width="150" height="80" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="145" y="405" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="bold">MEMORY</text>
  <text x="145" y="422" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Mnemosyne</text>
  <text x="145" y="437" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Vector + FTS</text>
  <rect x="325" y="380" width="150" height="80" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="405" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="bold">SKILLS</text>
  <text x="400" y="422" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Tool Registry</text>
  <text x="400" y="437" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">212 tools</text>
  <rect x="580" y="380" width="150" height="80" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="655" y="405" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="bold">PROVIDERS</text>
  <text x="655" y="422" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">LLM Gateway</text>
  <text x="655" y="437" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">19 providers</text>
  <!-- Arrows from core to tiers -->
  <line x1="280" y1="325" x2="145" y2="380" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="370" y1="350" x2="400" y2="380" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="430" y1="350" x2="655" y2="380" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Provider badges -->
  <rect x="250" y="480" width="300" height="80" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="400" y="500" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">SUPPORTED PROVIDERS</text>
  <text x="310" y="518" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Anthropic · OpenAI · Google</text>
  <text x="490" y="518" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Mistral · Groq · Together</text>
  <text x="310" y="534" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Fireworks · Azure · Bedrock</text>
  <text x="490" y="534" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">DeepSeek · xAI · +9 more</text>
  <text x="400" y="575" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Full REST API · WebSocket streams · Session management · No vendor lock-in</text>
</svg>
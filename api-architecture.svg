<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="b1"/>
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-inner" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Background gradient -->
    <radialGradient id="bg-rad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#12100e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#050403" stop-opacity="1"/>
    </radialGradient>

    <!-- Scan lines pattern -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ff3c14" stroke-width="0.4" opacity="0.04"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff3c14" stroke-width="0.5" opacity="0.05"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#ff3c14"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#ffa050"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#06b6d4"/>
    </marker>

    <!-- Focal core gradient -->
    <radialGradient id="core-rad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6842" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ff3c14" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff3c14" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow orb gradients per accent -->
    <radialGradient id="orb-crimson" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3c14" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff3c14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffa050" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffa050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background layers -->
  <rect width="900" height="580" fill="#050403"/>
  <rect width="900" height="580" fill="url(#bg-rad)"/>
  <rect width="900" height="580" fill="url(#grid)"/>
  <rect width="900" height="580" fill="url(#scanlines)"/>

  <!-- Corner brackets -->
  <g stroke="#a0301a" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M 14 14 L 14 36 M 14 14 L 36 14"/>
    <path d="M 886 14 L 886 36 M 886 14 L 864 14"/>
    <path d="M 14 566 L 14 544 M 14 566 L 36 566"/>
    <path d="M 886 566 L 886 544 M 886 566 L 864 566"/>
  </g>

  <!-- Top header bar -->
  <line x1="40" y1="46" x2="100" y2="46" stroke="#ff3c14" stroke-width="1.5"/>
  <text x="40" y="40" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff3c14" font-weight="700" letter-spacing="4">ZEUS</text>
  <text x="120" y="40" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#8a8278" letter-spacing="3">13 · API</text>
  <text x="860" y="40" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#5a5650" text-anchor="end" letter-spacing="2">NOVAXAI · 2026</text>

  <!-- Title -->
  <text x="40" y="80" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="24" fill="#f5f0eb" font-weight="700" letter-spacing="2">API Architecture</text>
  <text x="40" y="102" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#8a8278" font-style="italic" letter-spacing="0.5">REST · WebSocket · MCP · Full platform access</text>

  
  <rect x="370" y="155" width="160" height="55" fill="#12100e" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="370" y="155" width="3" height="55" fill="#06b6d4"/>
  <text x="450" y="178" text-anchor="middle" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#06b6d4" font-weight="700" letter-spacing="3">EXTERNAL CLIENT</text>
  <text x="450" y="197" text-anchor="middle" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">CURL · WebSocket · MCP</text>
<line x1="450" y1="210" x2="450" y2="240" stroke="#ff3c14" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="450" cy="270" r="80" fill="url(#orb-crimson)" opacity="0.4"/>
  <rect x="350" y="240" width="200" height="70" fill="#050403" stroke="#ff3c14" stroke-width="2" filter="url(#glow-strong)"/>
  <rect x="350" y="240" width="200" height="3" fill="#ff3c14"/>
  <text x="450" y="262" text-anchor="middle" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff3c14" font-weight="700" letter-spacing="3">API GATEWAY · :8080</text>
  <text x="450" y="280" text-anchor="middle" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#f5f0eb" font-weight="700">Auth · Routes · Rate-limit</text>
  <text x="450" y="297" text-anchor="middle" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#22c55e" font-style="italic">● serving</text>
<line x1="450" y1="310" x2="450" y2="340" stroke="#ff3c14" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="305" y="340" width="290" height="55" fill="#12100e" stroke="#ff6842" stroke-width="1.5" filter="url(#glow-soft)"/>
  <rect x="305" y="340" width="3" height="55" fill="#ff6842"/>
  <text x="450" y="362" text-anchor="middle" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#ff6842" font-weight="700" letter-spacing="3">ZEUS CORE ENGINE</text>
  <text x="450" y="382" text-anchor="middle" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">Cognitive Loop · Event Driver · Turn Control</text>
<path d="M 450 395 Q 450 410 220.0 410 L 220.0 422" stroke="#ffa050" stroke-width="1.2" opacity="0.6" fill="none" marker-end="url(#arrow-amber)"/>
  <rect x="120.0" y="425" width="200" height="60" fill="#12100e" stroke="#ffa050" stroke-width="1.5"/>
  <rect x="120.0" y="425" width="3" height="60" fill="#ffa050"/>
  <text x="135.0" y="447" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ffa050" font-weight="700" letter-spacing="3">MEM</text>
  <text x="135.0" y="467" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#f5f0eb" font-weight="700">MEMORY</text>
  <text x="305.0" y="467" text-anchor="end" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#8a8278" font-style="italic">Vector + FTS</text>
<path d="M 450 395 Q 450 410 450.0 410 L 450.0 422" stroke="#ff3c14" stroke-width="1.2" opacity="0.6" fill="none" marker-end="url(#arrow)"/>
  <rect x="350.0" y="425" width="200" height="60" fill="#12100e" stroke="#ff3c14" stroke-width="1.5"/>
  <rect x="350.0" y="425" width="3" height="60" fill="#ff3c14"/>
  <text x="365.0" y="447" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff3c14" font-weight="700" letter-spacing="3">AGT</text>
  <text x="365.0" y="467" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#f5f0eb" font-weight="700">AGENTS</text>
  <text x="535.0" y="467" text-anchor="end" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#8a8278" font-style="italic">Loop · Tools</text>
<path d="M 450 395 Q 450 410 680.0 410 L 680.0 422" stroke="#22c55e" stroke-width="1.2" opacity="0.6" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="580.0" y="425" width="200" height="60" fill="#12100e" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="580.0" y="425" width="3" height="60" fill="#22c55e"/>
  <text x="595.0" y="447" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#22c55e" font-weight="700" letter-spacing="3">PRV</text>
  <text x="595.0" y="467" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#f5f0eb" font-weight="700">PROVIDERS</text>
  <text x="765.0" y="467" text-anchor="end" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#8a8278" font-style="italic">11 LLMs</text>

  <rect x="60" y="510" width="780" height="32" fill="#1a1410" stroke="#a0301a" stroke-width="0.75"/>
  <text x="450.0" y="528" text-anchor="middle" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#a0301a" font-weight="700" letter-spacing="3">267 REST ROUTES  ·  WEBSOCKET STREAMS  ·  SESSION MANAGEMENT  ·  NO VENDOR LOCK-IN</text>

</svg>
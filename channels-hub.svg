  <rect x="330" y="405" width="140" height="55" rx="6" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2"/>
  <text x="400" y="430" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">Email</text>
  <text x="400" y="447" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● CONNECTED</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="550" fill="#0a0a0f"/>
  <text x="400" y="35" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="16" font-weight="bold" letter-spacing="2">CHANNELS HUB</text>
  <text x="400" y="55" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="11">8 messaging platforms · Unified inbox · Zero lock-in</text>
  <!-- Center hub -->
  <circle cx="400" cy="280" r="60" fill="#1a1a2e" stroke="#ff3c14" stroke-width="3" filter="url(#glow)"/>
  <text x="400" y="268" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">ZEUS</text>
  <text x="400" y="283" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">HUB</text>
  <text x="400" y="300" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Unified</text>
  <!-- Discord -->
  <line x1="400" y1="220" x2="400" y2="150" stroke="#ff3c14" stroke-width="2"/>

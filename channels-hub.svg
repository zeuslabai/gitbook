  <text x="400" y="115" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">Discord</text>
  <text x="400" y="132" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● CONNECTED</text>
  <!-- Telegram -->

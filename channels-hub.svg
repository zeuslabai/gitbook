  <rect x="555" y="165" width="140" height="55" rx="6" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2"/>
  <text x="625" y="190" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">Telegram</text>
  <text x="625" y="207" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">● CONNECTED</text>
  <!-- Slack -->

  <rect x="105" y="165" width="140" height="55" rx="6" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2"/>
  <text x="175" y="190" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">WhatsApp</text>
  <text x="175" y="207" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">○ AVAILABLE</text>
  <!-- Signal -->
  <line x1="460" y1="260" x2="550" y2="165" stroke="#ff3c14" stroke-width="2"/>
  <rect x="555" y="90" width="140" height="55" rx="6" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2"/>
  <text x="625" y="115" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">Signal</text>
  <text x="625" y="132" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">○ AVAILABLE</text>
  <!-- Matrix -->
  <line x1="340" y1="280" x2="250" y2="280" stroke="#ff3c14" stroke-width="2"/>
  <rect x="105" y="252" width="140" height="55" rx="6" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2"/>
  <text x="175" y="277" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">Matrix</text>
  <text x="175" y="294" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">○ AVAILABLE</text>
  <!-- Bottom note -->
  <rect x="250" y="485" width="300" height="40" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="400" y="505" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">All channels unified · Per-channel ACLs · End-to-end encrypted</text>
  <text x="400" y="520" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">zeus channel add discord · zeus channel list</text>

  <text x="345.0" y="529" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#d4cfc8" font-style="italic">via zeus skill add · community-shareable</text>

  <rect x="586.0" y="495" width="240" height="42" fill="#12100e" stroke="#a855f7" stroke-width="1"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="skillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="#0a0a0f"/>
  <text x="400" y="30" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="15" font-weight="bold" letter-spacing="2">SKILL MANIFEST STRUCTURE</text>
  <text x="400" y="48" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">zeus skill add &lt;name&gt; · Hot-reloadable at runtime</text>
  <!-- Root block -->
  <rect x="240" y="65" width="320" height="45" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="87" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">SKILL MANIFEST (skill.yaml)</text>
  <text x="400" y="102" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">version · name · description · tools · triggers</text>
  <!-- Connector -->
  <line x1="400" y1="110" x2="400" y2="140" stroke="#ff3c14" stroke-width="2"/>
  <!-- version block -->
  <rect x="40" y="150" width="180" height="55" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="130" y="173" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">version</text>
  <text x="130" y="190" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">"1.0.0" · semver</text>
  <text x="130" y="203" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">manifest schema rev</text>
  <!-- name block -->
  <rect x="240" y="150" width="180" height="55" rx="6" fill="#1a1a2e" stroke="#ff3c14" stroke-width="2"/>
  <text x="330" y="173" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">name</text>
  <text x="330" y="190" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">"code-review"</text>
  <text x="330" y="203" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">unique identifier</text>
  <!-- triggers block -->
  <rect x="440" y="150" width="180" height="55" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="530" y="173" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">triggers</text>
  <text x="530" y="190" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">[keyword, intent, channel]</text>
  <text x="530" y="203" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">event patterns</text>
  <!-- tools block (larger) -->
  <rect x="640" y="150" width="150" height="55" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="715" y="173" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="11" font-weight="bold">tools[]</text>
  <text x="715" y="190" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">tool definitions</text>
  <text x="715" y="203" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">input/output schemas</text>
  <!-- Second row connectors -->
  <line x1="130" y1="205" x2="130" y2="240" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <line x1="330" y1="205" x2="330" y2="240" stroke="#ff3c14" stroke-width="1"/>
  <line x1="530" y1="205" x2="530" y2="240" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <line x1="715" y1="205" x2="715" y2="240" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <!-- Tool item (expanded) -->
  <rect x="40" y="250" width="720" height="120" rx="8" fill="#1a1a2e" stroke="#ff3c14" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="12" font-weight="bold">TOOL DEFINITION EXAMPLE</text>
  <text x="120" y="300" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">name: "grep"</text>
  <text x="300" y="300" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">description: "Search"</text>
  <text x="480" y="300" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">input_schema:</text>
  <text x="650" y="300" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">path, pattern</text>
  <text x="120" y="322" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">handler: "python"</text>
  <text x="300" y="322" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">code or endpoint</text>
  <text x="480" y="322" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">output_schema:</text>
  <text x="650" y="322" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="10">matches[]</text>
  <text x="400" y="350" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Supports: Python · Node.js · Shell · HTTP endpoints · Built-in Zeus tools</text>
  <!-- Bottom panels -->
  <rect x="40" y="390" width="220" height="80" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="150" y="413" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="10" font-weight="bold">BUILT-IN SKILLS (70+)</text>
  <text x="150" y="432" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">web-search · code-exec</text>
  <text x="150" y="447" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">file-ops · shell · pdf</text>
  <text x="150" y="462" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">Full registry: zeus skill list</text>
  <rect x="290" y="390" width="220" height="80" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="400" y="413" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="10" font-weight="bold">MCP TOOL BRIDGING</text>
  <text x="400" y="432" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Any MCP server → Zeus tool</text>
  <text x="400" y="447" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">seamless interoperability</text>
  <text x="400" y="462" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">zeus mcp add &lt;server-url&gt;</text>
  <rect x="540" y="390" width="220" height="80" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>
  <text x="650" y="413" text-anchor="middle" fill="#ff3c14" font-family="monospace" font-size="10" font-weight="bold">CUSTOM MANIFESTS</text>
  <text x="650" y="432" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Write skill.yaml · deploy</text>
  <text x="650" y="447" text-anchor="middle" fill="#e6e6e6" font-family="monospace" font-size="9">Hot-reload at runtime</text>
  <text x="650" y="462" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">zeus skill reload &lt;name&gt;</text>
  <text x="400" y="490" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="10">Hot-reload · Versioned · Community-shareable · Self-hosted registry</text>
</svg>
  <text x="535" y="285" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff3c14" font-weight="700" letter-spacing="3">TRG</text>
  <text x="535" y="305" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#f5f0eb" font-weight="700">triggers</text>
  <text x="535" y="320" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff6842">[keyword, intent, ...]</text>

  <line x1="840" y1="221" x2="840" y2="265" stroke="#a0301a" stroke-width="0.75" stroke-dasharray="2,4" opacity="0.6"/>

  <rect x="750" y="265" width="180" height="65" fill="#1a1410" stroke="#a0301a" stroke-width="1"/>

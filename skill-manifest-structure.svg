  <text x="89.0" y="529" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#d4cfc8" font-style="italic">Bundled in zeus-skills · 70+ at v1</text>

  <rect x="330.0" y="495" width="240" height="42" fill="#12100e" stroke="#ffa050" stroke-width="1"/>

<text x="100" y="405" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10"><tspan fill="#06b6d4">name</tspan><tspan fill="#5a5650">:</tspan><tspan fill="#ff6842"> "grep"</tspan></text><text x="100" y="418" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10"><tspan fill="#06b6d4">description</tspan><tspan fill="#5a5650">:</tspan><tspan fill="#ff6842"> "Search files matching pattern"</tspan></text><text x="100" y="431" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10"><tspan fill="#06b6d4">input_schema</tspan><tspan fill="#5a5650">:</tspan><tspan fill="#ff6842"></tspan></text><text x="100" y="444" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10"><tspan fill="#06b6d4">  path</tspan><tspan fill="#5a5650">:</tspan><tspan fill="#ff6842"> { type: string, required: true }</tspan></text><text x="100" y="457" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10"><tspan fill="#06b6d4">  pattern</tspan><tspan fill="#5a5650">:</tspan><tspan fill="#ff6842"> { type: string, required: true }</tspan></text><text x="100" y="470" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="10"><tspan fill="#06b6d4">handler</tspan><tspan fill="#5a5650">:</tspan><tspan fill="#ff6842"> "python: grep_handler.py"</tspan></text>

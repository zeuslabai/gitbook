<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="#0a0a14"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold" letter-spacing="2">SKILL MANIFEST STRUCTURE</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="monospace" font-size="11">~/.zeus/skills/my-skill/ · Structured capability packages for Titans</text>
  
  <!-- Root skill folder -->
  <rect x="280" y="80" width="240" height="40" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="14" font-weight="bold">my-skill/</text>
  
  <!-- SKILL.md - main manifest -->
  <rect x="60" y="150" width="300" height="80" rx="8" fill="#1a1a2e" stroke="#ff44cc" stroke-width="2" filter="url(#glow4)"/>
  <text x="210" y="180" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="13" font-weight="bold">SKILL.md</text>
  <text x="210" y="200" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">The skill manifest · Defines everything</text>
  <rect x="80" y="212" width="260" height="10" rx="2" fill="rgba(255,68,204,0.2)"/>
  <rect x="80" y="212" width="180" height="10" rx="2" fill="rgba(255,68,204,0.4)"/>
  
  <!-- prompts/ folder -->
  <rect x="440" y="150" width="300" height="80" rx="8" fill="#1a1a2e" stroke="#00ff88" stroke-width="2"/>
  <text x="590" y="180" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="13" font-weight="bold">prompts/</text>
  <text x="590" y="200" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Custom prompt templates</text>
  <rect x="460" y="212" width="260" height="10" rx="2" fill="rgba(0,255,136,0.2)"/>
  
  <!-- tools/ folder -->
  <rect x="60" y="260" width="300" height="80" rx="8" fill="#1a1a2e" stroke="#ffaa00" stroke-width="2"/>
  <text x="210" y="290" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="13" font-weight="bold">tools/</text>
  <text x="210" y="310" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Tool definitions · MCP tools</text>
  <rect x="80" y="322" width="260" height="10" rx="2" fill="rgba(255,170,0,0.2)"/>
  
  <!-- resources/ folder -->
  <rect x="440" y="260" width="300" height="80" rx="8" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
  <text x="590" y="290" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="13" font-weight="bold">resources/</text>
  <text x="590" y="310" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Static assets · Data files</text>
  <rect x="460" y="322" width="260" height="10" rx="2" fill="rgba(0,212,255,0.2)"/>
  
  <!-- Connecting lines -->
  <path d="M400 120 L210 150" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <path d="M400 120 L590 150" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <path d="M400 120 L210 260" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <path d="M400 120 L590 260" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  
  <!-- SKILL.md content breakdown -->
  <rect x="40" y="380" width="720" height="160" rx="8" fill="#1a1a2e" stroke="#ff44cc" stroke-width="1.5"/>
  <text x="400" y="405" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="12" font-weight="bold">SKILL.md CONTENTS</text>
  
  <rect x="60" y="420" width="160" height="30" rx="4" fill="rgba(255,68,204,0.1)" stroke="#ff44cc" stroke-width="1"/>
  <text x="140" y="440" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="11">name · version</text>
  
  <rect x="240" y="420" width="160" height="30" rx="4" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="1"/>
  <text x="320" y="440" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11">description</text>
  
  <rect x="420" y="420" width="160" height="30" rx="4" fill="rgba(255,170,0,0.1)" stroke="#ffaa00" stroke-width="1"/>
  <text x="500" y="440" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="11">tools[]</text>
  
  <rect x="600" y="420" width="140" height="30" rx="4" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="670" y="440" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="11">prompts[]</text>
  
  <rect x="60" y="465" width="200" height="30" rx="4" fill="rgba(255,68,204,0.1)" stroke="#ff44cc" stroke-width="1"/>
  <text x="160" y="485" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="11">capabilities[]</text>
  
  <rect x="280" y="465" width="200" height="30" rx="4" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="1"/>
  <text x="380" y="485" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="11">dependencies[]</text>
  
  <rect x="500" y="465" width="200" height="30" rx="4" fill="rgba(255,170,0,0.1)" stroke="#ffaa00" stroke-width="1"/>
  <text x="600" y="485" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="11">resources/</text>
  
  <!-- Install command -->
  <rect x="200" y="510" width="400" height="40" rx="6" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1"/>
  <text x="400" y="535" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="12">zeus skills install my-skill</text>
  
  <!-- Footer -->
  <text x="400" y="580" text-anchor="middle" fill="#444" font-family="monospace" font-size="10">Install from ClawHub · URL · or local path</text>
</svg>
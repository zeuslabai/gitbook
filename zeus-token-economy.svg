<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="b1"/>
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-inner" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Background gradient -->
    <radialGradient id="bg-rad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#12100e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#050403" stop-opacity="1"/>
    </radialGradient>

    <!-- Scan lines pattern -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ff3c14" stroke-width="0.4" opacity="0.04"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff3c14" stroke-width="0.5" opacity="0.05"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#ff3c14"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#ffa050"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L0,9 L10,5 Z" fill="#06b6d4"/>
    </marker>

    <!-- Focal core gradient -->
    <radialGradient id="core-rad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6842" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ff3c14" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff3c14" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow orb gradients per accent -->
    <radialGradient id="orb-crimson" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3c14" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff3c14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffa050" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffa050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background layers -->
  <rect width="900" height="580" fill="#050403"/>
  <rect width="900" height="580" fill="url(#bg-rad)"/>
  <rect width="900" height="580" fill="url(#grid)"/>
  <rect width="900" height="580" fill="url(#scanlines)"/>

  <!-- Corner brackets -->
  <g stroke="#a0301a" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M 14 14 L 14 36 M 14 14 L 36 14"/>
    <path d="M 886 14 L 886 36 M 886 14 L 864 14"/>
    <path d="M 14 566 L 14 544 M 14 566 L 36 566"/>
    <path d="M 886 566 L 886 544 M 886 566 L 864 566"/>
  </g>

  <!-- Top header bar -->
  <line x1="40" y1="46" x2="100" y2="46" stroke="#ff3c14" stroke-width="1.5"/>
  <text x="40" y="40" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff3c14" font-weight="700" letter-spacing="4">ZEUS</text>
  <text x="120" y="40" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#8a8278" letter-spacing="3">11 · ECONOMY</text>
  <text x="860" y="40" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#5a5650" text-anchor="end" letter-spacing="2">NOVAXAI · 2026</text>

  <!-- Title -->
  <text x="40" y="80" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="24" fill="#f5f0eb" font-weight="700" letter-spacing="2">Zeus Token Economy</text>
  <text x="40" y="102" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="13" fill="#8a8278" font-style="italic" letter-spacing="0.5">Per-transaction · No subscription · Operators keep value</text>

  
  <rect x="80" y="170" width="220" height="160" fill="#12100e" stroke="#ff3c14" stroke-width="1.5"/>
  <rect x="80" y="170" width="3" height="160" fill="#ff3c14"/>
  <circle cx="292" cy="200" r="22" fill="#ff3c14" opacity="0.15"/>
  <text x="95" y="200" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff3c14" font-weight="700" letter-spacing="3">OPS</text>
  <text x="95" y="225" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="14" fill="#f5f0eb" font-weight="700">OPERATOR WALLET</text>
  <text x="95" y="245" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#8a8278" font-style="italic">Local · Self-custodial</text>
  <line x1="95" y1="255" x2="285" y2="255" stroke="#2e2218" stroke-width="0.5"/>
<text x="100" y="275" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">Encrypted at rest</text><text x="100" y="293" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">Per-user secrets</text>
  <rect x="350" y="170" width="220" height="160" fill="#12100e" stroke="#ffa050" stroke-width="1.5"/>
  <rect x="350" y="170" width="3" height="160" fill="#ffa050"/>
  <circle cx="562" cy="200" r="22" fill="#ffa050" opacity="0.15"/>
  <text x="365" y="200" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ffa050" font-weight="700" letter-spacing="3">AGR</text>
  <text x="365" y="225" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="14" fill="#f5f0eb" font-weight="700">AGORA</text>
  <text x="365" y="245" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#8a8278" font-style="italic">Discover · Match · Settle</text>
  <line x1="365" y1="255" x2="555" y2="255" stroke="#2e2218" stroke-width="0.5"/>
<text x="370" y="275" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">▸ List Titans</text><text x="370" y="293" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">▸ Browse Agora</text><text x="370" y="311" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">▸ x402 settlement</text>
  <rect x="620" y="170" width="220" height="160" fill="#12100e" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="620" y="170" width="3" height="160" fill="#22c55e"/>
  <circle cx="832" cy="200" r="22" fill="#22c55e" opacity="0.15"/>
  <text x="635" y="200" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#22c55e" font-weight="700" letter-spacing="3">SLR</text>
  <text x="635" y="225" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="14" fill="#f5f0eb" font-weight="700">TITAN SELLER</text>
  <text x="635" y="245" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#8a8278" font-style="italic">Earn per invocation</text>
  <line x1="635" y1="255" x2="825" y2="255" stroke="#2e2218" stroke-width="0.5"/>
<text x="640" y="275" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">No platform take</text><text x="640" y="293" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">100% to operator</text>
  <line x1="300" y1="250" x2="350" y2="250" stroke="#ffa050" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <line x1="570" y1="250" x2="620" y2="250" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="60" y="365" width="780" height="105" fill="#1a1410" stroke="#a0301a" stroke-width="0.75" stroke-dasharray="4,4"/>

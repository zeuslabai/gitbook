  <text x="112.0" y="438" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff6842">ops agora publish</text>

  <text x="268.0" y="425" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="22" fill="#ff3c14" font-weight="700" opacity="0.5">02</text>
  <text x="306.0" y="420" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">Buyer discovers + pays</text>
  <text x="306.0" y="438" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff6842">buyer agora exec</text>

  <text x="462.0" y="425" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="22" fill="#ff3c14" font-weight="700" opacity="0.5">03</text>
  <text x="500.0" y="420" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">Settlement direct in USDC</text>
  <text x="500.0" y="438" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff6842">x402 settle</text>

  <text x="656.0" y="425" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="22" fill="#ff3c14" font-weight="700" opacity="0.5">04</text>
  <text x="694.0" y="420" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#d4cfc8">No middleman fees</text>
  <text x="694.0" y="438" font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#ff6842">0% Zeus take</text>

  <rect x="60" y="490" width="780" height="42" fill="#401008" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="60" y="490" width="3" height="42" fill="#22c55e"/>
  <text x="450.0" y="513" text-anchor="middle" font-family="Tektur, 'Tektur', 'Inter', 'Helvetica Neue', sans-serif" font-size="14" fill="#22c55e" font-weight="700" letter-spacing="3">NO PLATFORM RAKE</text>
  <text x="450.0" y="528" text-anchor="middle" font-family="Rajdhani, 'Rajdhani', 'Inter', 'Helvetica Neue', sans-serif" font-size="10" fill="#d4cfc8" font-style="italic">100% of payment flows to operator · Zeus takes nothing</text>

</svg>
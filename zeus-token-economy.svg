  <text x="170" y="248" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Token sink mechanism</text>
  <text x="170" y="263" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Regulate supply</text>
  
  <!-- Agora - Bottom right -->

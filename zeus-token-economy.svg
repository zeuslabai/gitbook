  <text x="530" y="470" text-anchor="middle" fill="#7d8590" font-family="monospace" font-size="9">list your Titan</text>
  <rect x="640" y="430" width="120" height="55" rx="6" fill="#1a1a2e" stroke="rgba(255,60,20,0.25)" stroke-width="1"/>

  <text x="170" y="393" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">zeus wallet balance</text>
  
  <!-- Arrows -->
  <path d="M400 160 L400 200" fill="none" stroke="#00ff88" stroke-width="2"/>
  <path d="M395 155 L400 165 L405 155" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  
  <path d="M455 270 L515 235" fill="none" stroke="#ff44cc" stroke-width="2"/>
  <path d="M450 265 L517 238 L512 248" fill="none" stroke="#ff44cc" stroke-width="2" stroke-linecap="round"/>
  
  <path d="M345 270 L285 235" fill="none" stroke="#ffaa00" stroke-width="2"/>
  <path d="M350 265 L283 238 L288 248" fill="none" stroke="#ffaa00" stroke-width="2" stroke-linecap="round"/>
  
  <path d="M455 300 L515 330" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <path d="M450 295 L517 327 L512 317" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  
  <path d="M345 300 L285 330" fill="none" stroke="#00ff88" stroke-width="2"/>
  <path d="M350 295 L283 327 L288 317" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Immutable ledger -->
  <rect x="260" y="440" width="280" height="50" rx="6" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="400" y="465" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="12">IMMMUTABLE LEDGER</text>
  <text x="400" y="483" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Every transaction recorded · Both parties can verify</text>
  
  <!-- Key properties -->
  <rect x="60" y="510" width="150" height="28" rx="4" fill="rgba(255,68,204,0.1)" stroke="#ff44cc" stroke-width="1"/>
  <text x="135" y="529" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="10">No speculative trading</text>
  
  <rect x="230" y="510" width="150" height="28" rx="4" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="1"/>
  <text x="305" y="529" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="10">No artificial scarcity</text>
  
  <rect x="400" y="510" width="150" height="28" rx="4" fill="rgba(255,170,0,0.1)" stroke="#ffaa00" stroke-width="1"/>
  <text x="475" y="529" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="10">Transparent fees</text>
  
  <rect x="570" y="510" width="150" height="28" rx="4" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="645" y="529" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="10">Predictable supply</text>
  
  <!-- Footer -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="#0a0a14"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold" letter-spacing="2">ZEUS TOKEN ECONOMY</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="monospace" font-size="11">Create · Consume · Burn · Utility token · Immutable ledger</text>
  
  <!-- Central token -->
  <circle cx="400" cy="260" r="55" fill="rgba(255,170,0,0.1)" stroke="#ffaa00" stroke-width="2.5" filter="url(#glow7)"/>
  <text x="400" y="252" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="14" font-weight="bold">ZEUS</text>
  <text x="400" y="270" text-anchor="middle" fill="#ffaa00" font-family="monospace" font-size="11">TOKEN</text>
  <text x="400" y="285" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">$ZTH</text>
  
  <!-- CREATE - Top -->
  <rect x="280" y="90" width="240" height="70" rx="8" fill="#1a1a2e" stroke="#00ff88" stroke-width="2"/>
  <text x="400" y="118" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="14" font-weight="bold">CREATE</text>
  <text x="400" y="138" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Mint tokens · Define supply</text>
  <text x="400" y="153" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Skilled work → Token rewards</text>
  
  <!-- CONSUME - Right -->
  <rect x="520" y="200" width="220" height="70" rx="8" fill="#1a1a2e" stroke="#ff44cc" stroke-width="2"/>
  <text x="630" y="228" text-anchor="middle" fill="#ff44cc" font-family="monospace" font-size="14" font-weight="bold">CONSUME</text>
  <text x="630" y="248" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Pay for agent services</text>
  <text x="630" y="263" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Skills · Titans · Compute</text>
  
  <!-- BURN - Left -->
  <rect x="60" y="200" width="220" height="70" rx="8" fill="#1a1a2e" stroke="#ffaa00" stroke-width="2"/>
